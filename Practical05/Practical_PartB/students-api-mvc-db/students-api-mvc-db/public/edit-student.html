<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Student</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <nav>
      <a href="students.html" class="brand">&#127979; Students API</a>
      <a href="students.html">All Students</a>
      <a href="create-student.html">Add Student</a>
    </nav>

    <div class="page">
      <div class="page-header">
        <h1>Edit Student</h1>
        <a href="students.html" class="btn btn-outline">&#8592; Back</a>
      </div>

      <div class="card">
        <div id="message" class="message"></div>

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Student name" />
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" placeholder="Student address" />
        </div>

        <button class="btn btn-primary" onclick="updateStudent()">
          Save Changes
        </button>
      </div>
    </div>

    <script src="js/edit-student.js"></script>
  </body>
</html>
